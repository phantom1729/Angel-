<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakshak Angel Terminal</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Orbitron', sans-serif; text-align: center; margin:0; }
        .status-box { border: 2px solid #00ff00; padding: 30px; margin: 50px auto; width: 85%; box-shadow: 0 0 20px #00ff00; border-radius: 15px; }
        .alert-active { background: #8b0000 !important; color: #fff !important; border-color: #ff0000 !important; box-shadow: 0 0 40px #ff0000 !important; animation: blink 0.8s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.7;} 100% {opacity: 1;} }
        .btn-nav { background: #fff; color: #ff0000; border: none; padding: 20px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 10px; font-size: 18px; margin-top: 20px; display: none; }
    </style>
</head>
<body onclick="enableAudio()">
    <div id="mainDisplay" class="status-box">
        <h1>ANGEL TERMINAL</h1>
        <p id="statusText">📡 SYSTEM SCANNING...</p>
        <button id="navBtn" class="btn-nav">NAVIGATE TO VICTIM</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRVPpAPAquoxRrMxSUbinZ9Z8bRIlB37M",
            databaseURL: "https://raksha-network-299bf-default-rtdb.firebaseio.com",
            projectId: "raksha-network-299bf"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let siren = new Audio('alarm.mp3'); 
        siren.loop = true;
        let audioAllowed = false;

        function enableAudio() { audioAllowed = true; console.log("Audio Enabled"); }

        // Service Worker Register
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Active"));
        }

        // Real-time Alert Listener
        db.ref('global_alerts').limitToLast(1).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const currentTime = Date.now();
            
            if (data && (currentTime - data.timestamp < 120000)) {
                document.getElementById("mainDisplay").classList.add("alert-active");
                document.getElementById("statusText").innerHTML = `🚨 EMERGENCY: ${data.user} 🚨`;
                const navBtn = document.getElementById("navBtn");
                navBtn.style.display = "block";
                navBtn.onclick = () => window.open(`https://www.google.com/maps?q=${data.lat},${data.lon}`);
                
                if(audioAllowed) siren.play();
                if(navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            }
        });
    </script>
</body>
</html>
