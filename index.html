<body>
    <h1 style="text-align:center; font-family: sans-serif;">📡 Angel Terminal Active</h1>
    <p style="text-align:center;">Listening for SOS signals...</p>

    <script>
        // आपका Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBRVPpAPAquoxRrMxSUbinZ9Z8bRIlB37M",
            databaseURL: "https://raksha-network-299bf-default-rtdb.firebaseio.com",
            projectId: "raksha-network-299bf"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ANGEL_BOT_TOKEN = "8607561861:AAExnrMsiHpECU8i9fjvkV6UakL00m1CjiY";
        const CHAT_ID = "8508792403";

        // फायरबेस को सुनना
        // फायरबेस को सुनना
db.ref('global_alerts').limitToLast(1).on('child_added', (snapshot) => {
    const data = snapshot.val();
    const currentTime = Date.now();
    
    console.log("New data detected in Firebase!"); // चेक करने के लिए कि डेटा आ रहा है या नहीं

    // टेस्टिंग के लिए समय की सीमा (60000) को हटाकर देखें या बढ़ा दें
    if (data) {
        const mapLink = `https://www.google.com/maps?q=${data.lat},${data.lon}`; // सही मैप लिंक फॉर्मेट
        const msg = `🚨 *NEW SOS ALERT FROM NETWORK* 🚨\n👤 *User:* ${data.user}\n📍 *Loc:* [Navigate to Victim](${mapLink})`;

        fetch(`https://api.telegram.org/bot${ANGEL_BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: msg,
                parse_mode: 'Markdown'
            })
        })
        .then(res => res.json())
        .then(json => console.log("Telegram Response:", json))
        .catch(err => console.error("Error sending to Telegram:", err));
    }
});
    </script>
