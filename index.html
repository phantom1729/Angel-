<!DOCTYPE html>
<html>
<head>
    <title>Rakshak Angel Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <h1 style="text-align:center; font-family: sans-serif;">📡 Angel Terminal Active</h1>
    <p style="text-align:center;">Listening for SOS signals...</p>

    <script>
        // आपका Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBRVPpAPAquoxRrMxSUbinZ9Z8bRIlB37M",
            databaseURL: "https://raksha-network-299bf-default-rtdb.firebaseio.com",
            projectId: "raksha-network-299bf"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ANGEL_BOT_TOKEN = "8607561861:AAExnrMsiHpECU8i9fjvkV6UakL00m1CjiY";
        const CHAT_ID = "8508792403";

        // फायरबेस को सुनना
        db.ref('global_alerts').limitToLast(1).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const currentTime = Date.now();

            // अगर अलर्ट 1 मिनट से ज्यादा पुराना नहीं है
            if (data && (currentTime - data.timestamp < 60000)) {
                const mapLink = `https://www.google.com/maps?q=$${data.lat},${data.lon}`;
                const msg = `🚨 *NEW SOS ALERT FROM NETWORK* 🚨\n👤 *User:* ${data.user}\n📍 *Loc:* [Navigate to Victim](${mapLink})`;

                // Telegram पर अलर्ट भेजना
                fetch(`https://api.telegram.org/bot${ANGEL_BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                
                console.log("Alert sent to Angels!");
            }
        });
    </script>
</body>
</html>
